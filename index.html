<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive vs. Negative Areas</title>
    <style>
        /* Base Setup & 3D Perspective */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #2c3e50; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; /* Prevents scrollbars from parallax movement */
            perspective: 1000px; /* Crucial for the 3D tilt effect */
        }

        /* Parallax Background Elements */
        .parallax-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }
        .parallax-element {
            position: absolute; font-weight: bold;
            color: rgba(255, 255, 255, 0.15); user-select: none;
        }

        header { text-align: center; margin-bottom: 20px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        h1 { font-size: 2.5rem; margin-bottom: 5px; letter-spacing: 1px; }
        p.subtitle { font-size: 1.1rem; opacity: 0.9; }

        /* 3D Interactive Container */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.5);
            text-align: center; width: 90%; max-width: 800px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Smooth snapping for mouse follow */
        }

        /* Canvas for the math animation */
        canvas {
            background: white; border: 2px solid #ecf0f1;
            border-radius: 12px; margin-bottom: 20px; max-width: 100%; height: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transform: translateZ(30px); /* Pops the canvas out in 3D space */
        }

        .controls {
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
            transform: translateZ(40px); /* Pops buttons out */
        }

        button {
            padding: 12px 20px; font-size: 0.95rem; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 7px 15px rgba(0,0,0,0.2); }
        button:active { transform: translateY(0); }

        .btn-positive { background-color: #2ecc71; }
        .btn-negative { background-color: #e74c3c; }
        .btn-net { background-color: #3498db; }
        .btn-example { background-color: #9b59b6; }
        .btn-reset { background-color: #34495e; }

        .explanation {
            background: #f8f9fa; padding: 20px; border-radius: 10px;
            font-size: 1.15rem; min-height: 70px; display: flex;
            align-items: center; justify-content: center; line-height: 1.5;
            border-left: 5px solid #667eea;
            transform: translateZ(20px);
        }

    </style>
</head>
<body>

    <div class="parallax-bg">
        <div class="parallax-element" data-speed="2" style="top: 10%; left: 10%; font-size: 5rem;">+</div>
        <div class="parallax-element" data-speed="-4" style="top: 20%; left: 80%; font-size: 7rem;">∫</div>
        <div class="parallax-element" data-speed="3" style="top: 70%; left: 15%; font-size: 4rem;">f(x)</div>
        <div class="parallax-element" data-speed="-2" style="top: 80%; left: 85%; font-size: 6rem;">-</div>
        <div class="parallax-element" data-speed="5" style="top: 50%; left: 90%; font-size: 3rem;">=</div>
        <div class="parallax-element" data-speed="-3" style="top: 40%; left: 5%; font-size: 4rem;">x</div>
    </div>

    <header>
        <h1>Positive vs. Negative Areas</h1>
        <p class="subtitle">Visualizing Net Area when functions cross the zero line.</p>
    </header>

    <div class="container" id="presentationCard">
        <canvas id="mathCanvas" width="700" height="350"></canvas>

        <div class="controls">
            <button class="btn-positive" onclick="animatePositive()">1. Positive Area</button>
            <button class="btn-negative" onclick="animateNegative()">2. Negative Area</button>
            <button class="btn-net" onclick="animateNet()">3. Net Area</button>
            <button class="btn-example" onclick="showExample()">4. Original Example</button>
            <button class="btn-reset" onclick="resetGraph()">Reset</button>
        </div>

        <div class="explanation" id="text-box">
            Welcome! Move your mouse around to see the 3D effect, and click the buttons to start.
        </div>
    </div>

    <script>
        /* --- PARALLAX & 3D TILT LOGIC --- */
        const card = document.getElementById('presentationCard');
        const parallaxElements = document.querySelectorAll('.parallax-element');

        document.addEventListener('mousemove', (e) => {
            // Calculate mouse position relative to the center of the screen
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40; 
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;

            // Apply 3D tilt to the main container
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;

            // Move the background math symbols at different speeds
            parallaxElements.forEach(el => {
                let speed = el.getAttribute('data-speed');
                let x = (window.innerWidth - e.pageX * speed) / 100;
                let y = (window.innerHeight - e.pageY * speed) / 100;
                el.style.transform = `translateX(${x}px) translateY(${y}px)`;
            });
        });

        // Reset the 3D tilt if the mouse leaves the screen
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        /* --- MATH ANIMATION LOGIC (From previous step) --- */
        const canvas = document.getElementById('mathCanvas');
        const ctx = canvas.getContext('2d');
        const textBox = document.getElementById('text-box');
        const width = canvas.width; const height = canvas.height; const midY = height / 2;
        let animationId; let progress = 0;

        function drawGrid() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath(); ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 2;
            ctx.moveTo(0, midY); ctx.lineTo(width, midY); ctx.stroke(); 
            ctx.fillStyle = '#7f8c8d'; ctx.font = '16px Arial';
            ctx.fillText("x-axis (Zero Line)", width - 140, midY - 10);
        }

        function drawWave() {
            ctx.beginPath(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3;
            for(let x = 0; x <= width; x++) {
                let y = midY - Math.sin((x / width) * Math.PI * 2) * 120;
                if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function fillWavePos(pct) {
            ctx.beginPath(); ctx.fillStyle = 'rgba(46, 204, 113, 0.6)'; ctx.moveTo(0, midY);
            for(let x = 0; x <= (width/2) * pct; x++) {
                ctx.lineTo(x, midY - Math.sin((x / width) * Math.PI * 2) * 120);
            }
            ctx.lineTo((width/2) * pct, midY); ctx.fill();
        }

        function fillWaveNeg(pct) {
            ctx.beginPath(); ctx.fillStyle = 'rgba(231, 76, 60, 0.6)'; ctx.moveTo(width/2, midY);
            for(let x = width/2; x <= (width/2) + ((width/2) * pct); x++) {
                ctx.lineTo(x, midY - Math.sin((x / width) * Math.PI * 2) * 120);
            }
            ctx.lineTo((width/2) + ((width/2) * pct), midY); ctx.fill();
        }

        function animatePositive() {
            cancelAnimationFrame(animationId); progress = 0;
            textBox.innerHTML = "<strong>Positive Area:</strong> The space ABOVE the line. We are accumulating positive value, like earning money.";
            function frame() {
                progress += 0.02; drawGrid(); fillWavePos(Math.min(progress, 1)); drawWave();
                if(progress < 1) animationId = requestAnimationFrame(frame);
            } frame();
        }

        function animateNegative() {
            cancelAnimationFrame(animationId); progress = 0;
            textBox.innerHTML = "<strong>Negative Area:</strong> The space BELOW the line. We are accumulating negative value, like spending money.";
            function frame() {
                progress += 0.02; drawGrid(); fillWavePos(1); fillWaveNeg(Math.min(progress, 1)); drawWave();
                if(progress < 1) animationId = requestAnimationFrame(frame);
            } frame();
        }

        function animateNet() {
            cancelAnimationFrame(animationId); drawGrid(); fillWavePos(1); fillWaveNeg(1); drawWave();
            ctx.fillStyle = '#27ae60'; ctx.font = 'bold 24px Arial'; ctx.fillText("+ Area", width/4 - 30, midY - 40);
            ctx.fillStyle = '#c0392b'; ctx.fillText("- Area", (width/4)*3 - 30, midY + 50);
            textBox.innerHTML = "<strong>Net Area:</strong> Positive Area + Negative Area.<br>They are exactly the same size, so they cancel out! Net Area = 0.";
        }

        function showExample() {
            cancelAnimationFrame(animationId); drawGrid();
            
            let startX = 100; let endX = 600; let midX = 350;
            let startY = midY + 120; let endY = midY - 120;   
            
            ctx.beginPath(); ctx.fillStyle = 'rgba(231, 76, 60, 0.6)';
            ctx.moveTo(startX, midY); ctx.lineTo(midX, midY); ctx.lineTo(startX, startY); ctx.fill();
            
            ctx.beginPath(); ctx.fillStyle = 'rgba(46, 204, 113, 0.6)';
            ctx.moveTo(midX, midY); ctx.lineTo(endX, midY); ctx.lineTo(endX, endY); ctx.fill();
            
            ctx.beginPath(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3;
            ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();

            ctx.fillStyle = 'black'; ctx.font = '16px Arial';
            ctx.fillText("x = 0", startX - 15, midY - 10);
            ctx.fillText("x = 2", midX - 15, midY - 10);
            ctx.fillText("x = 4", endX - 15, midY + 20);
            
            ctx.fillStyle = '#c0392b'; ctx.font = 'bold 20px Arial'; ctx.fillText("Area = -4", startX + 50, midY + 50);
            ctx.fillStyle = '#27ae60'; ctx.fillText("Area = +4", midX + 50, midY - 30);

            textBox.innerHTML = "<strong>Original Example: f(x) = 2x - 4</strong><br>Negative Triangle = -4. Positive Triangle = 4. Net Area = 0.";
        }

        function resetGraph() {
            cancelAnimationFrame(animationId); drawGrid(); drawWave();
            textBox.innerHTML = "Graph reset. The presentation is ready!";
        }
        window.onload = resetGraph;
    </script>
</body>
</html>
